<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c8cff"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- 标签页图标 -->
  <g transform="translate(24, 24)">
    <!-- 第一个标签页 -->
    <rect x="0" y="0" width="40" height="32" rx="4" fill="white" opacity="0.9"/>
    <rect x="4" y="4" width="32" height="24" rx="2" fill="#6c8cff" opacity="0.3"/>

    <!-- 第二个标签页 -->
    <rect x="20" y="16" width="40" height="32" rx="4" fill="white" opacity="0.8"/>
    <rect x="24" y="20" width="32" height="24" rx="2" fill="#a78bfa" opacity="0.3"/>

    <!-- 第三个标签页 -->
    <rect x="40" y="32" width="40" height="32" rx="4" fill="white" opacity="0.7"/>
    <rect x="44" y="36" width="32" height="24" rx="2" fill="#f87171" opacity="0.3"/>
  </g>

  <!-- 管理图标（齿轮） -->
  <circle cx="96" cy="96" r="16" fill="white" opacity="0.9"/>
  <circle cx="96" cy="96" r="8" fill="url(#bg)"/>
  <circle cx="96" cy="96" r="4" fill="white"/>
</svg>
